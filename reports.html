<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="学术论文跟踪助手 - 周报月报">
    <title>周报月报 - 学术论文跟踪助手</title>
    <link rel="icon" type="image/png" href="assets/logo2-removebg-preview.png">
    <link rel="shortcut icon" type="image/png" href="assets/logo2-removebg-preview.png">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/reports.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">

    <!-- Authentication Scripts -->
    <script src="js/auth-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Check authentication on page load
        Auth.requireAuth();

        // Show logout button only if password protection is enabled
        document.addEventListener('DOMContentLoaded', function() {
            const logoutButton = document.getElementById('logoutButton');
            if (logoutButton && Auth.isPasswordEnabled()) {
                logoutButton.style.display = '';
            }
        });
    </script>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-content">
                <div class="header-left">
                    <a href="index.html" class="hit-emblem-link"><img src="assets/logo.png" alt="哈工大校徽" class="hit-emblem-img"><span class="hit-badge">哈尔滨工业大学</span></a>
                </div>

                <div class="header-center">
                    <a href="index.html" class="site-logo">
                        <img src="assets/logo2-removebg-preview.png" alt="学术论文跟踪助手 Logo" class="logo-image">
                        <span class="site-title">学术论文跟踪助手</span>
                    </a>
                </div>

                <div class="header-controls">
                    <a href="index.html" class="back-button" title="Back to Home">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M20 11H7.83L13.42 5.41L12 4L4 12L12 20L13.41 18.59L7.83 13H20V11Z" fill="currentColor"/>
                        </svg>
                    </a>
                    <button id="logoutButton" onclick="Auth.logout()" class="icon-button" title="Logout" style="border: none; background: transparent; cursor: pointer; color: #e74c3c; display: none;">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M17 7L15.59 8.41L18.17 11H8V13H18.17L15.59 15.59L17 17L22 12L17 7ZM4 5H12V3H4C2.9 3 2 3.9 2 5V19C2 20.1 2.9 21 4 21H12V19H4V5Z" fill="currentColor"/>
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <main class="reports-page">
            <div class="reports-container">
                <div class="reports-header">
                    <h1>Reports</h1>
                    <p>Weekly and monthly AI-generated research trend reports with word clouds</p>
                </div>

                <!-- Tabs -->
                <div class="reports-tabs">
                    <button class="tab-button active" data-tab="weekly">
                        📅 Weekly Reports
                    </button>
                    <button class="tab-button" data-tab="monthly">
                        📈 Monthly Reports
                    </button>
                </div>

                <!-- Two-panel layout -->
                <div class="reports-body">
                    <!-- Left: report list -->
                    <div class="report-list-panel">
                        <div class="report-list-title">Available Reports</div>
                        <div class="report-list-scroll" id="reportListScroll">
                            <div class="status-loading">Loading reports...</div>
                        </div>
                    </div>

                    <!-- Right: report viewer -->
                    <div class="report-viewer-panel" id="reportViewer">
                        <div class="report-viewer-placeholder">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M14 2H6C4.9 2 4 2.9 4 4V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V8L14 2ZM18 20H6V4H13V9H18V20ZM9 13H15V15H9V13ZM9 17H15V19H9V17ZM9 9H12V11H9V9Z" fill="currentColor"/>
                            </svg>
                            <p>Select a report from the list to view it</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <div class="footer-content">
                <p>&copy; 2025 学术论文跟踪助手 | 哈尔滨工业大学 | <a href="https://github.com/Love-Luo-Tianyi/daily-arXiv-ai-enhanced" target="_blank">GitHub</a></p>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/reports.js"></script>
</body>
</html>
