# Monthly arXiv review workflow
# Runs on the 1st of each month and generates a comprehensive trend analysis

name: arXiv-monthly-review

on:
  schedule:
    # First day of each month at 05:00 UTC
    - cron: "0 5 1 * *"
  workflow_dispatch:
    inputs:
      month:
        description: "Target month (YYYY-MM, defaults to last month)"
        required: false
        type: string

jobs:
  monthly-review:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        uv sync

    - name: Generate monthly review
      run: |
        source .venv/bin/activate
        echo "📋 Generating monthly arXiv trend analysis..."

        cd ai
        export OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
        export OPENAI_BASE_URL=${{ secrets.OPENAI_BASE_URL }}
        export LANGUAGE="${{ vars.LANGUAGE }}"
        export MODEL_NAME="${{ vars.MODEL_NAME }}"

        MONTH_ARG=""
        if [ -n "${{ github.event.inputs.month }}" ]; then
          MONTH_ARG="--month ${{ github.event.inputs.month }}"
        fi

        python monthly_summary.py \
          --data_dir ../data \
          --output_dir ../data/monthly \
          --asset_dir ../assets \
          $MONTH_ARG

        echo "✅ Monthly review generation completed"

    - name: Commit and push monthly review
      run: |
        git config --global user.email "${{ vars.EMAIL }}"
        git config --global user.name "${{ vars.NAME }}"

        # Update reports-list.json
        python3 -c "
import os, json

def list_reports(path, ext='.md'):
    if not os.path.isdir(path):
        return []
    return sorted([f for f in os.listdir(path) if f.endswith(ext) and f != '.gitkeep'], reverse=True)

weekly = list_reports('data/weekly')
monthly = list_reports('data/monthly')
wordclouds = list_reports('assets', '.png')
wordclouds = [f for f in wordclouds if f.startswith('wordcloud-')]
data = {'weekly': weekly, 'monthly': monthly, 'wordclouds': wordclouds}
with open('assets/reports-list.json', 'w') as f:
    json.dump(data, f, indent=2)
print('reports-list.json updated')
"

        git add data/monthly/ assets/wordcloud-*.png assets/reports-list.json
        if git diff --staged --quiet; then
          echo "No new monthly review to commit"
          exit 0
        fi
        git commit -m "update: monthly review $(date -u '+%Y-%m')"

    - name: Pull latest changes and push
      run: |
        git config pull.rebase true
        git config rebase.autoStash true
        for i in {1..3}; do
          echo "Push attempt $i"
          if git push origin main; then
            echo "Push successful"
            break
          else
            git pull origin main --no-edit || true
            if [ $i -eq 3 ]; then
              echo "Failed to push after 3 attempts"
              exit 1
            fi
          fi
        done
